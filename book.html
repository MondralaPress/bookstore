<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book – The Polish Atheneum</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .product-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .breadcrumbs {
      font-size: 13px;
      color: #777;
      margin-bottom: 22px;
    }

    .breadcrumbs a {
      color: inherit;
      text-decoration: none;
    }

    .breadcrumbs a:hover {
      text-decoration: underline;
    }

    .product-top {
      display: grid;
      grid-template-columns: minmax(280px, 420px) minmax(320px, 1fr);
      gap: 48px;
      align-items: start;
      margin-bottom: 56px;
    }

    .product-cover-wrap {
      position: sticky;
      top: 20px;
    }

    .product-cover {
      width: 100%;
      border: 1px solid #ddd;
      background: #f7f7f7;
      aspect-ratio: 2 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .product-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-series {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8a8a8a;
      margin-bottom: 10px;
    }

    .product-title {
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.08;
      margin: 0 0 12px;
      font-weight: 500;
    }

    .product-contributors {
      font-size: 18px;
      line-height: 1.5;
      margin: 0 0 18px;
      color: #333;
    }

    .product-price {
      font-size: 24px;
      margin: 0 0 18px;
      min-height: 1.2em;
    }

    .product-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 22px;
      padding: 0;
      list-style: none;
    }

    .product-tags li {
      border: 1px solid #ddd;
      padding: 6px 10px;
      font-size: 13px;
      color: #555;
      border-radius: 999px;
    }

    .product-buybox {
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      padding: 22px 0;
      margin: 0 0 24px;
    }

    .buy-row {
      margin-bottom: 16px;
    }

    .buy-row label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .buy-row select,
    .buy-row input {
      width: 100%;
      max-width: 280px;
      padding: 10px 12px;
      border: 1px solid #bbb;
      background: white;
      font-size: 15px;
    }

    .buy-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .primary-button {
      display: inline-block;
      background: #111;
      color: white;
      text-decoration: none;
      padding: 13px 22px;
      font-size: 15px;
      border: none;
      cursor: pointer;
    }

    .primary-button:hover {
      background: #333;
    }

    .primary-button.disabled {
      background: #777;
      cursor: default;
      pointer-events: none;
    }

    .secondary-link {
      font-size: 14px;
      color: #444;
      text-decoration: none;
    }

    .secondary-link:hover {
      text-decoration: underline;
    }

    .product-description {
      font-size: 17px;
      line-height: 1.75;
      color: #222;
      margin-bottom: 44px;
      max-width: 72ch;
    }

    .product-sections {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 56px;
    }

    .section-block h2 {
      font-size: 20px;
      margin: 0 0 18px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 10px;
      font-weight: 500;
    }

    .book-info-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .book-info-list li {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      font-size: 15px;
      line-height: 1.5;
    }

    .book-info-list strong {
      display: inline-block;
      min-width: 140px;
      color: #222;
    }

    .praise-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .praise-list li {
      margin-bottom: 22px;
      padding-bottom: 22px;
      border-bottom: 1px solid #eee;
    }

    .praise-quote {
      font-size: 16px;
      line-height: 1.7;
      margin: 0 0 8px;
      color: #222;
    }

    .praise-source {
      font-size: 14px;
      color: #666;
    }

    @media (max-width: 900px) {
      .product-top,
      .product-sections {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .product-cover-wrap {
        position: static;
        max-width: 420px;
      }
    }
  </style>
</head>
<body>
  <div class="top-banner">
    Spend $75 or more and get free shipping in the US, UK and EU.
  </div>

  <header>
    <div class="site-title">The Polish Atheneum</div>
    <nav>
      <a href="index.html">Shelves</a>
      <a href="#">Essays</a>
      <a href="#">About</a>
      <select id="currency-selector" aria-label="Select currency">
        <option value="EUR">EUR</option>
        <option value="USD">USD</option>
        <option value="GBP">GBP</option>
      </select>
    </nav>
  </header>

  <main class="product-page" id="productRoot">
    <p>Loading book…</p>
  </main>

  <footer>© 2026 The Polish Atheneum</footer>

  <script>
    const CURRENCY_KEY = "vistula_currency";
    const SYMBOL = { EUR: "€", USD: "$", GBP: "£" };

    function getCurrency() {
      return localStorage.getItem(CURRENCY_KEY) || "EUR";
    }

    function setCurrency(cur) {
      localStorage.setItem(CURRENCY_KEY, cur);
    }

    function formatMoney(value, cur) {
      if (value === null || value === undefined || value === "") return "";
      const num = Number(value);
      return Number.isFinite(num)
        ? `${SYMBOL[cur] || ""}${num.toFixed(2)}`
        : `${SYMBOL[cur] || ""}${value}`;
    }

    function getEditionPrice(edition, cur) {
      if (!edition) return "";
      if (cur === "USD") return edition.price_usd ?? "";
      if (cur === "GBP") return edition.price_gbp ?? "";
      return edition.price_eur ?? "";
    }

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    async function loadCatalog() {
      const res = await fetch("catalog.json");
      if (!res.ok) throw new Error("Could not load catalog.json");
      return await res.json();
    }

    function contributorLine(book) {
      const bits = [];
      if (book.author) bits.push(`by ${book.author}`);
      if (book.translator) bits.push(`translated by ${book.translator}`);
      if (book.introduction) bits.push(`introduction by ${book.introduction}`);
      return bits.join(", ");
    }

    function tagList(book) {
      const tags = [];
      if (book.genre) tags.push(book.genre);
      if (book.category) tags.push(book.category);
      if (book.series) tags.push(book.series);
      return tags;
    }

    function normalizeEditions(book) {
      if (!Array.isArray(book.editions)) return [];

      return book.editions.filter(ed => {
        if (!ed) return false;
        const hasFormat = String(ed.format || "").trim() !== "";
        const hasAnyOtherData =
          String(ed.publisher || "").trim() !== "" ||
          String(ed.supplier || "").trim() !== "" ||
          String(ed.sku || "").trim() !== "" ||
          String(ed.buy_link || "").trim() !== "" ||
          String(ed.isbn || "").trim() !== "" ||
          String(ed.price_eur ?? "").trim() !== "" ||
          String(ed.price_usd ?? "").trim() !== "" ||
          String(ed.price_gbp ?? "").trim() !== "";
        return hasFormat && hasAnyOtherData;
      });
    }

    function renderFormatOptions(editions) {
      return editions.map((ed, index) =>
        `<option value="${index}">${ed.format}</option>`
      ).join("");
    }

    function renderBook(book, cur) {
      const editions = normalizeEditions(book);
      const firstEdition = editions[0] || null;
      const price = firstEdition ? formatMoney(getEditionPrice(firstEdition, cur), cur) : "";
      const tags = tagList(book);
      const description = book.description_long || book.description_short || book.description || book.blurb || "";
      const praise = Array.isArray(book.praise) ? book.praise : [];

      const formatControl = editions.length
        ? `
          <div class="buy-row">
            <label for="format-selector">Format</label>
            <select id="format-selector">
              ${renderFormatOptions(editions)}
            </select>
          </div>
        `
        : "";

      const firstBuyLink = firstEdition && firstEdition.buy_link ? firstEdition.buy_link : "";
      const buyLabel = firstBuyLink ? "Buy now" : "Unavailable";
      const buyClass = firstBuyLink ? "primary-button" : "primary-button disabled";

      return `
        <nav class="breadcrumbs">
          <a href="index.html">Home</a> /
          <a href="category.html?name=${encodeURIComponent(book.category || "Books")}">${book.category || "Books"}</a> /
          <span>${book.title}</span>
        </nav>

        <section class="product-top">
          <div class="product-cover-wrap">
            <div class="product-cover">
              ${book.cover ? `<img src="${book.cover}" alt="${book.title} cover">` : `<span>No cover</span>`}
            </div>
          </div>

          <div class="product-meta">
            ${book.series ? `<div class="product-series">${book.series}</div>` : ""}
            <h1 class="product-title">${book.title}</h1>
            ${contributorLine(book) ? `<p class="product-contributors">${contributorLine(book)}</p>` : ""}
            <p class="product-price" id="edition-price">${price}</p>

            ${tags.length ? `
              <ul class="product-tags">
                ${tags.map(tag => `<li>${tag}</li>`).join("")}
              </ul>
            ` : ""}

            <div class="product-buybox">
              ${formatControl}

              <div class="buy-row">
                <label for="qty">Quantity</label>
                <input id="qty" type="number" min="1" value="1" />
              </div>

              <div class="buy-actions">
                <a href="${firstBuyLink || "#"}" class="${buyClass}" id="buy-button">${buyLabel}</a>
                <a href="#" class="secondary-link">Request review copy</a>
              </div>
            </div>

            ${description ? `<div class="product-description">${description}</div>` : ""}
          </div>
        </section>

        <section class="product-sections">
          <div class="section-block">
            <h2>Additional Book Information</h2>
            <ul class="book-info-list">
              ${book.series ? `<li><strong>Series:</strong> ${book.series}</li>` : ""}
              ${book.pages ? `<li><strong>Pages:</strong> ${book.pages}</li>` : ""}
              ${book.pub_date ? `<li><strong>Publication Date:</strong> ${book.pub_date}</li>` : ""}
              <li id="edition-format-row" style="display:none;"><strong>Format:</strong> <span id="edition-format"></span></li>
              <li id="edition-publisher-row" style="display:none;"><strong>Publisher:</strong> <span id="edition-publisher"></span></li>
              <li id="edition-supplier-row" style="display:none;"><strong>Supplier:</strong> <span id="edition-supplier"></span></li>
              <li id="edition-sku-row" style="display:none;"><strong>SKU:</strong> <span id="edition-sku"></span></li>
              <li id="edition-isbn-row" style="display:none;"><strong>ISBN:</strong> <span id="edition-isbn"></span></li>
            </ul>
          </div>

          <div class="section-block">
            <h2>Praise</h2>
            ${
              praise.length
                ? `<ul class="praise-list">
                    ${praise.map(item => `
                      <li>
                        <p class="praise-quote">${item.quote || ""}</p>
                        <div class="praise-source">${item.source || ""}</div>
                      </li>
                    `).join("")}
                  </ul>`
                : `<p>No praise entries yet.</p>`
            }
          </div>
        </section>
      `;
    }

    function setRowValue(rowId, valueId, value) {
      const row = document.getElementById(rowId);
      const span = document.getElementById(valueId);
      if (!row || !span) return;

      if (value && String(value).trim() !== "") {
        span.textContent = value;
        row.style.display = "";
      } else {
        span.textContent = "";
        row.style.display = "none";
      }
    }

    function updateEditionUI(book) {
      const editions = normalizeEditions(book);
      const formatSelector = document.getElementById("format-selector");
      const priceEl = document.getElementById("edition-price");
      const buyButton = document.getElementById("buy-button");
      const cur = getCurrency();

      let selectedEdition = editions[0] || null;

      if (formatSelector && editions.length) {
        const idx = Number(formatSelector.value);
        if (Number.isInteger(idx) && editions[idx]) {
          selectedEdition = editions[idx];
        }
      }

      if (priceEl) {
        const price = selectedEdition ? formatMoney(getEditionPrice(selectedEdition, cur), cur) : "";
        priceEl.textContent = price || "";
      }

      if (buyButton) {
        const link = selectedEdition?.buy_link || "";
        buyButton.href = link || "#";
        buyButton.textContent = link ? "Buy now" : "Unavailable";
        buyButton.classList.toggle("disabled", !link);
      }

      setRowValue("edition-format-row", "edition-format", selectedEdition?.format || "");
      setRowValue("edition-publisher-row", "edition-publisher", selectedEdition?.publisher || "");
      setRowValue("edition-supplier-row", "edition-supplier", selectedEdition?.supplier || "");
      setRowValue("edition-sku-row", "edition-sku", selectedEdition?.sku || "");
      setRowValue("edition-isbn-row", "edition-isbn", selectedEdition?.isbn || "");
    }

    function wireCurrencySelector(book) {
      const selector = document.getElementById("currency-selector");
      if (!selector) return;
      selector.value = getCurrency();
      selector.addEventListener("change", () => {
        setCurrency(selector.value);
        updateEditionUI(book);
      });
    }

    function wireFormatSelector(book) {
      const selector = document.getElementById("format-selector");
      if (!selector) return;
      selector.addEventListener("change", () => {
        updateEditionUI(book);
      });
    }

    (async () => {
      const root = document.getElementById("productRoot");

      try {
        const bookId = getQueryParam("id");
        const books = await loadCatalog();
        const book = books.find(b => String(b.id) === String(bookId));

        if (!book) {
          root.innerHTML = "<p>Book not found.</p>";
          return;
        }

        document.title = `${book.title} – The Polish Atheneum`;
        root.innerHTML = renderBook(book, getCurrency());
        wireCurrencySelector(book);
        wireFormatSelector(book);
        updateEditionUI(book);
      } catch (err) {
        console.error(err);
        root.innerHTML = "<p>Failed to load book.</p>";
      }
    })();
  </script>
</body>
</html>
