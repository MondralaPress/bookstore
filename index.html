<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Polish Atheneum</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="logo">THE POLISH ATHENEUM</div>
</header>

<section class="hero">
  <h1>Polish Books in English</h1>
  <p>A curated library of literature, history, and thought — selected for serious readers.</p>
</section>

<!-- ================= SLIDER ================= -->
<section class="slider">
  <div class="slider-container">
    <div class="slides" id="slides"></div>

    <button class="nav prev">&#10094;</button>
    <button class="nav next">&#10095;</button>

    <div class="controls">
      <div class="dots" id="dots"></div>
      <button id="pauseBtn">Pause</button>
    </div>
  </div>
</section>

<main id="content"></main>

<footer class="site-footer">
  <p>&copy; Mondrala Press</p>
</footer>

<script>
const SHELF_ORDER = [
  "Classics",
  "Poetry",
  "Polish History",
  "Fiction",
  "Genre Literature",
  "Non-Fiction",
  "Young Adult"
];

const FEATURE_SLIDES = [
  { image: "slides/slide-1.jpg", link: "#" },
  { image: "slides/slide-2.jpg", link: "#" },
  { image: "slides/slide-3.jpg", link: "#" },
  { image: "slides/slide-4.jpg", link: "#" }
];

let currentSlide = 0;
let interval;
let paused = false;

function initSlider() {
  const slidesContainer = document.getElementById("slides");
  const dotsContainer = document.getElementById("dots");

  FEATURE_SLIDES.forEach((s, i) => {
    const slide = document.createElement("div");
    slide.className = "slide";
    slide.innerHTML = `<a href="${s.link}"><img src="${s.image}"></a>`;
    slidesContainer.appendChild(slide);

    const dot = document.createElement("span");
    dot.className = "dot";
    dot.onclick = () => goToSlide(i);
    dotsContainer.appendChild(dot);
  });

  updateSlider();
  interval = setInterval(nextSlide, 5000);
}

function updateSlider() {
  const slides = document.querySelectorAll(".slide");
  const dots = document.querySelectorAll(".dot");

  slides.forEach((s, i) => {
    s.style.display = i === currentSlide ? "block" : "none";
  });

  dots.forEach((d, i) => {
    d.classList.toggle("active", i === currentSlide);
  });
}

function nextSlide() {
  currentSlide = (currentSlide + 1) % FEATURE_SLIDES.length;
  updateSlider();
}

function prevSlide() {
  currentSlide = (currentSlide - 1 + FEATURE_SLIDES.length) % FEATURE_SLIDES.length;
  updateSlider();
}

function goToSlide(i) {
  currentSlide = i;
  updateSlider();
}

document.querySelector(".next").onclick = nextSlide;
document.querySelector(".prev").onclick = prevSlide;

document.getElementById("pauseBtn").onclick = () => {
  if (paused) {
    interval = setInterval(nextSlide, 5000);
    paused = false;
    pauseBtn.innerText = "Pause";
  } else {
    clearInterval(interval);
    paused = true;
    pauseBtn.innerText = "Play";
  }
};

initSlider();

// ================= BOOKS =================

fetch("catalog.json")
  .then(res => res.json())
  .then(data => {
    const content = document.getElementById("content");

    SHELF_ORDER.forEach(shelf => {
      const books = data.filter(b =>
        b.shelves && b.shelves.map(s => s.toLowerCase())
          .includes(shelf.toLowerCase())
      );

      if (!books.length) return;

      const section = document.createElement("section");
      section.className = "shelf";

      section.innerHTML = `
        <h2>${shelf}</h2>
        <div class="grid">
          ${books.slice(0, 20).map(book => `
            <a href="book.html?id=${book.id}" class="book">
              <img src="${book.cover}" />
              <div class="title">${book.title}</div>
              <div class="author">${book.author}</div>
            </a>
          `).join("")}
        </div>
      `;

      content.appendChild(section);
    });
  });
</script>

</body>
</html>
