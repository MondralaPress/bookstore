<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Polish Atheneum</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="top-banner">
    Spend $75 or more and get free shipping in the US, UK and EU.
  </div>

  <header>
    <div class="site-title">The Polish Atheneum</div>

    <nav>
      <a href="#">Shelves</a>
      <a href="#">Essays</a>
      <a href="#">About</a>

      <select id="currency-selector" aria-label="Select currency">
        <option value="EUR">EUR</option>
        <option value="USD">USD</option>
        <option value="GBP">GBP</option>
      </select>
    </nav>
  </header>

  <section class="hero">
    <h1>Polish Books in English</h1>
    <p>A curated library of literature, history, and thought — selected for serious readers.</p>
  </section>

  <main id="shelvesRoot" class="shelves-root"></main>

  <footer>© 2026 The Polish Atheneum</footer>

  <script>
    // Home page shelf order (exact string match to catalog values)
    const SHELF_ORDER = [
      "Books in Focus",
      "Classics",
      "Poetry",
      "Polish History",
      "Fiction",
      "Non-Fiction",
      "Young Adult"
    ];

    const MAX_ROW_ITEMS = 14;

    // ===== Currency =====
    const CURRENCY_KEY = "vistula_currency";
    const SYMBOL = { EUR: "€", USD: "$", GBP: "£" };

    function getCurrency() {
      return localStorage.getItem(CURRENCY_KEY) || "EUR";
    }

    function setCurrency(cur) {
      localStorage.setItem(CURRENCY_KEY, cur);
    }

    function formatMoney(value, cur) {
      if (value === null || value === undefined || value === "") return "";
      const num = Number(value);
      const formatted = Number.isFinite(num) ? num.toFixed(2) : String(value);
      return `${SYMBOL[cur] || ""}${formatted}`;
    }

    function priceFor(book, cur) {
      if (cur === "USD") return book.price_usd ?? "";
      if (cur === "GBP") return book.price_gbp ?? "";
      return book.price_eur ?? "";
    }

    function applyCurrencyUI(cur) {
      const selector = document.getElementById("currency-selector");
      if (selector) {
        selector.value = cur;
      }

      document.querySelectorAll(".price").forEach(el => {
        const eur = el.getAttribute("data-price-eur") || "";
        const usd = el.getAttribute("data-price-usd") || "";
        const gbp = el.getAttribute("data-price-gbp") || "";
        const val = (cur === "USD") ? usd : (cur === "GBP") ? gbp : eur;
        el.textContent = formatMoney(val, cur);
      });
    }

    // ===== Links =====
    const categoryHref = name => `category.html?name=${encodeURIComponent(name)}`;
    const bookHref = id => `book.html?id=${encodeURIComponent(id)}`;

    async function loadCatalog() {
      const res = await fetch("catalog.json");
      if (!res.ok) throw new Error("Could not load catalog.json");
      return await res.json();
    }

    // ===== Multi-shelf support (array OR "A; B; C" string OR old shelf/category) =====
    function normalizeShelves(b) {
      if (Array.isArray(b.shelves)) {
        return b.shelves.map(s => String(s).trim()).filter(Boolean);
      }
      if (typeof b.shelves === "string" && b.shelves.trim()) {
        return b.shelves.split(";").map(s => s.trim()).filter(Boolean);
      }
      if (b.shelf) return [String(b.shelf).trim()];
      if (b.category) return [String(b.category).trim()];
      return ["More"];
    }

    function groupByShelf(books) {
      const map = new Map();

      for (const b of books) {
        const shelves = normalizeShelves(b);
        for (const shelf of shelves) {
          if (!map.has(shelf)) map.set(shelf, []);
          map.get(shelf).push(b);
        }
      }

      return map;
    }

    function bookCardHTML(b, cur) {
      const cover = b.cover
        ? `<img class="cover-img" src="${b.cover}" alt="${b.title} cover">`
        : `<div class="cover" aria-hidden="true"></div>`;

      const v = priceFor(b, cur);

      return `
        <a class="book" href="${bookHref(b.id)}">
          ${cover}
          <h3>${b.title}</h3>
          <p class="author">${b.author}</p>
          <p class="price"
             data-price-eur="${b.price_eur ?? ""}"
             data-price-usd="${b.price_usd ?? ""}"
             data-price-gbp="${b.price_gbp ?? ""}">
             ${formatMoney(v, cur)}
          </p>
        </a>
      `;
    }

    function viewAllCardHTML(shelfName, total) {
      return `
        <a class="book view-all-card" href="${categoryHref(shelfName)}" aria-label="View all in ${shelfName}">
          <div class="view-all-box">
            <div class="view-all-title">View all</div>
            <div class="view-all-sub">${total} titles</div>
          </div>
        </a>
      `;
    }

    function shelfSectionHTML(title, books, cur) {
      const total = books.length;
      const shown = books.slice(0, MAX_ROW_ITEMS);
      const showViewAll = total > shown.length;

      const carouselId = `carousel-${encodeURIComponent(title).replace(/%/g, "")}`;

      return `
        <section class="shelf-section">
          <div class="shelf-head">
            <h2><a class="shelf-title-link" href="${categoryHref(title)}">${title}</a></h2>
            <a class="shelf-link" href="${categoryHref(title)}">View all</a>
          </div>

          <div class="carousel-wrap">
            <button class="carousel-btn prev" type="button" aria-label="Scroll left" data-target="${carouselId}">‹</button>

            <div class="row-carousel" id="${carouselId}" tabindex="0" aria-label="${title} carousel">
              ${shown.map(b => bookCardHTML(b, cur)).join("")}
              ${showViewAll ? viewAllCardHTML(title, total) : ""}
            </div>

            <button class="carousel-btn next" type="button" aria-label="Scroll right" data-target="${carouselId}">›</button>
          </div>
        </section>
      `;
    }

    // ===== Simple Carousel (no looping) =====
    function scrollCarousel(carouselEl, dir) {
      const amount = carouselEl.clientWidth;
      carouselEl.scrollBy({ left: dir * amount, behavior: "smooth" });
    }

    function wireCarouselButtons() {
      document.querySelectorAll(".carousel-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          const id = btn.getAttribute("data-target");
          const el = document.getElementById(id);
          if (!el) return;
          const dir = btn.classList.contains("prev") ? -1 : 1;
          scrollCarousel(el, dir);
        });
      });
    }

    function wireCurrencySelector() {
      const selector = document.getElementById("currency-selector");
      if (!selector) return;

      selector.addEventListener("change", () => {
        const cur = selector.value;
        setCurrency(cur);
        applyCurrencyUI(cur);
      });
    }

    (async () => {
      const root = document.getElementById("shelvesRoot");
      try {
        const cur = getCurrency();
        const books = await loadCatalog();
        const grouped = groupByShelf(books);

        const parts = [];

        // Editorial order first
        for (const name of SHELF_ORDER) {
          const arr = grouped.get(name);
          if (arr && arr.length) {
            parts.push(shelfSectionHTML(name, arr, cur));
            grouped.delete(name);
          }
        }

        // Remaining shelves alphabetically
        const remaining = Array.from(grouped.keys()).sort((a, b) => a.localeCompare(b));
        for (const name of remaining) {
          parts.push(shelfSectionHTML(name, grouped.get(name), cur));
        }

        root.innerHTML = parts.join("");
        wireCarouselButtons();
        wireCurrencySelector();
        applyCurrencyUI(cur);
      } catch (e) {
        console.error(e);
        root.innerHTML = `<p style="color:#a00; padding: 0 18px;">Failed to load catalog. See console for details.</p>`;
      }
    })();
  </script>
</body>
</html>
